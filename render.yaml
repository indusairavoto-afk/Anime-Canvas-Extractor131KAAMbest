databases:
  - name: nexa-anime-db
    databaseName: nexaanime
    user: nexaanime
    plan: free
    region: oregon

services:
  - type: web
    name: nexa-anime
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      npx --yes pnpm@10 install --frozen-lockfile &&
      npx pnpm@10 --filter @workspace/anime-site run build &&
      npx pnpm@10 --filter @workspace/api-server run build
    startCommand: >-
      npx pnpm@10 --filter @workspace/db run push-force &&
      npx pnpm@10 --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexa-anime-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
