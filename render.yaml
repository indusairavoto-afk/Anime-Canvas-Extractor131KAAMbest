databases:
  - name: nexa-anime-db
    databaseName: nexaanime
    user: nexaanime
    plan: free
    region: oregon

services:
  # Single web service: Express API + built React frontend (app.ts serves
  # artifacts/anime-site/dist, so all /api calls are same-origin) + the
  # Python Miruro sidecar (curl_cffi), started in-process as a background
  # task the same way the Replit dev workflow does it. No separate relay or
  # sidecar services — Render's IPs generally aren't Cloudflare-blocked the
  # way Replit's are, so the sidecar can talk to Miruro directly here.
  #
  # Uses a Docker runtime (see ./Dockerfile) instead of Render's native node
  # runtime because the native node image has no Python interpreter — it
  # cannot run the sidecar at all, which is why "one service" silently never
  # played video until this switch.
  - type: web
    name: nexa-anime
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexa-anime-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      # Optional: set these in Render dashboard to enable email features
      # (verification emails, password reset, magic code login)
      # If not set, registration/login still works — emails are simply skipped.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: FANART_API_KEY
        sync: false
      # Optional CF-bypass relay for the sidecar to fall back on if Miruro
      # ever starts blocking Render's IP range directly. Not required for
      # the sidecar to work; leave unset unless you see it start failing.
      - key: MIRURO_RELAY_URL
        sync: false
      - key: MIRURO_RELAY_SECRET
        sync: false
