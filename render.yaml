databases:
  - name: nexa-anime-db
    databaseName: nexaanime
    user: nexaanime
    plan: free
    region: oregon

services:
  # ── API backend ──────────────────────────────────────────────────────────────
  - type: web
    name: nexa-anime-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      npx --yes pnpm@10 install --frozen-lockfile &&
      npx --yes pnpm@10 --filter @workspace/api-server run build
    startCommand: >-
      npx --yes pnpm@10 --filter @workspace/db run push &&
      node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexa-anime-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false

  # ── Frontend static site ──────────────────────────────────────────────────────
  - type: web
    name: nexa-anime
    runtime: static
    region: oregon
    staticPublishPath: ./artifacts/anime-site/dist
    buildCommand: >-
      npx --yes pnpm@10 install --frozen-lockfile &&
      npx --yes pnpm@10 --filter @workspace/anime-site run build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexa-anime-api
          property: host
