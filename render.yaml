databases:
  - name: nexa-anime-db
    databaseName: nexaanime
    user: nexaanime
    plan: free
    region: oregon

services:
  # Single web service: Express API + serves the built React frontend as static files.
  # app.ts already serves artifacts/anime-site/dist when it exists, so no VITE_API_URL
  # is needed — all /api calls are same-origin.
  - type: web
    name: nexa-anime
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      npx --yes pnpm@10 install --frozen-lockfile &&
      npx --yes pnpm@10 --filter @workspace/anime-site run build &&
      npx --yes pnpm@10 --filter @workspace/api-server run build
    startCommand: >-
      npx --yes pnpm@10 --filter @workspace/db run push-force &&
      node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexa-anime-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      # Optional: set these in Render dashboard to enable email features
      # (verification emails, password reset, magic code login)
      # If not set, registration/login still works — emails are simply skipped.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Set this to the miruro-relay service's public URL after both services
      # have deployed once (e.g. https://miruro-relay-xxxx.onrender.com).
      # Setting this makes the main app route all Miruro requests through the
      # relay's non-blocked IP instead of trying to solve Cloudflare locally.
      - key: MIRURO_RELAY_URL
        sync: false
      # Set this to the miruro-sidecar service's public URL after it has
      # deployed once (e.g. https://miruro-sidecar-xxxx.onrender.com).
      # Without this, native Miruro playback always fails on Render because
      # it defaults to http://127.0.0.1:8090, which doesn't exist there.
      - key: MIRURO_SIDECAR_URL
        sync: false
      - key: MIRURO_RELAY_SECRET
        sync: false
      - key: FANART_API_KEY
        sync: false

  # Standalone forward-proxy for Miruro. Cloudflare hard-blocks Replit's dev
  # IPs but not most Render IPs, so this tiny service (no app logic, just a
  # allow-listed pass-through fetch) lets Miruro work even from environments
  # that are IP-blocked. See .agents/memory/miruro-cf-ip-block.md.
  - type: web
    name: miruro-relay
    runtime: node
    region: oregon
    plan: free
    buildCommand: >-
      npx --yes pnpm@10 install --frozen-lockfile &&
      npx --yes pnpm@10 --filter @workspace/miruro-relay run build &&
      npx --yes playwright install chromium --with-deps
    startCommand: node artifacts/miruro-relay/dist/index.mjs
    envVars:
      - key: PROXY_URL
        sync: false
    healthCheckPath: /healthz

  # Python sidecar that talks directly to Miruro's backend using curl_cffi's
  # TLS fingerprint impersonation (see artifacts/miruro-sidecar/main.py).
  # The main app's MIRURO_SIDECAR_URL must be set to this service's public
  # Render URL, or native Miruro playback silently falls back and fails
  # (it defaults to http://127.0.0.1:8090, which only exists on Replit).
  - type: web
    name: miruro-sidecar
    runtime: python
    region: oregon
    plan: free
    rootDir: artifacts/miruro-sidecar
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio
    envVars:
      - key: MIRURO_RELAY_URL
        sync: false
      - key: MIRURO_RELAY_SECRET
        sync: false
    healthCheckPath: /health
