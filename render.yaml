services:
  - type: web
    name: nexa-anime
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/anime-site run build && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
